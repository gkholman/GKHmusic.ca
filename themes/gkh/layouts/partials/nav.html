<nav id="site-nav">
  <a href="{{ if .IsHome }}#top{{ else }}/{{ end }}" class="nav-brand">GKH music</a>

  <button class="nav-hamburger" id="nav-toggle" aria-label="Open navigation menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>

  <ul class="nav-links">
    <li><a href="{{ if .IsHome }}#top{{ else }}/{{ end }}">Top</a></li>
    <li><a href="{{ if .IsHome }}{{ else }}/{{ end }}#about">About</a></li>
    <li><a href="{{ if .IsHome }}{{ else }}/{{ end }}#listen">Listen</a></li>
    <li><a href="{{ if .IsHome }}{{ else }}/{{ end }}#offer">What I Offer</a></li>
    <li><a href="{{ if .IsHome }}{{ else }}/{{ end }}#repertoire">Repertoire</a></li>
    <li><a href="{{ if .IsHome }}{{ else }}/{{ end }}#availability">Availability</a></li>
    <li><a href="{{ if .IsHome }}{{ else }}/{{ end }}#highlights">Gallery</a></li>
    <li><a href="{{ if .IsHome }}{{ else }}/{{ end }}#payment">Booking</a></li>
    <li><a href="{{ if .IsHome }}{{ else }}/{{ end }}#contact">Contact</a></li>
    <li><a href="{{ if .IsHome }}{{ else }}/{{ end }}#nashipai">Nashipai</a></li>
  </ul>
</nav>
<div id="nav-overlay"></div>

<script>
  (function () {
    var btn     = document.getElementById('nav-toggle');
    var nav     = document.getElementById('site-nav');
    var overlay = document.getElementById('nav-overlay');

    function openMenu() {
      nav.classList.add('nav-open');
      overlay.classList.add('nav-overlay-active');
      btn.setAttribute('aria-expanded', 'true');
    }
    function closeMenu() {
      nav.classList.remove('nav-open');
      overlay.classList.remove('nav-overlay-active');
      btn.setAttribute('aria-expanded', 'false');
    }

    btn.addEventListener('click', function () {
      nav.classList.contains('nav-open') ? closeMenu() : openMenu();
    });
    overlay.addEventListener('click', closeMenu);
    nav.querySelectorAll('.nav-links a').forEach(function (link) {
      link.addEventListener('click', closeMenu);
    });
  })();
</script>
